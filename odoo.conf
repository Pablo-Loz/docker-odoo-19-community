[options]
; =============================================
; Odoo 19 Community - Configuración COMPLETA
; =============================================
; Las opciones activas están sin comentar.
; Las opciones comentadas están disponibles para activar según necesidad.

; #############################################
; # CONEXIÓN A LA BASE DE DATOS
; #############################################
db_host = db
db_port = 5432
db_user = odoo
db_password = False          ; Se inyecta via variable de entorno en docker-compose
; db_name = False            ; Forzar una sola BD concreta
db_maxconn = 64              ; Conexiones máximas del pool a PostgreSQL
db_template = template0      ; Template para crear nuevas BDs
; db_sslmode = prefer        ; Modo SSL: disable | allow | prefer | require | verify-ca | verify-full

; #############################################
; # SEGURIDAD
; #############################################
admin_passwd = False         ; Contraseña maestra - se inyecta via .env
list_db = True               ; True para desarrollo, False para producción
; dbfilter = ^%d$            ; Filtro regex de BD según hostname (%h=host, %d=dominio)
proxy_mode = True            ; True si está detrás de un reverse proxy (Traefik, Nginx)
server_wide_modules = base,web

; #############################################
; # RUTAS DE ADDONS
; #############################################
addons_path = /mnt/extra-addons,/opt/odoo/muk-modules,/opt/odoo/oca/web,/opt/odoo/oca/server-tools,/opt/odoo/oca/server-ux,/opt/odoo/oca/reporting-engine,/opt/odoo/oca/partner-contact,/opt/odoo/oca/account-financial-tools,/opt/odoo/oca/queue,/opt/odoo/oca/social,/opt/odoo/oca/stock-logistics-workflow,/opt/odoo/oca/bank-payment,/opt/odoo/oca/server-brand,/usr/lib/python3/dist-packages/odoo/addons

; #############################################
; # SERVIDOR HTTP
; #############################################
http_port = 8069
; longpolling_port = 8072    ; Puerto websocket para chat en vivo y notificaciones
; xmlrpc_interface = 0.0.0.0 ; IP a la que se enlaza el servidor (vacío = todas)
; xmlrpc_port = 8069         ; Alias de http_port
netrpc = False               ; Protocolo NET-RPC obsoleto, siempre desactivar

; #############################################
; # WORKERS Y LÍMITES DE RECURSOS
; #############################################
; Regla: workers = (nº CPUs * 2) + 1
; workers = 0 = modo sin workers (desarrollo)
; workers = 4                ; Activar para producción
; max_cron_threads = 2       ; Workers dedicados a tareas programadas

; --- Límites de memoria ---
; limit_memory_hard = 2684354560   ; 2.5 GB - mata el worker si excede
; limit_memory_soft = 2147483648   ; 2.0 GB - recicla tras petición si excede

; --- Límites de tiempo ---
; limit_time_cpu = 600       ; Seg. máx. de CPU por petición (10 min)
; limit_time_real = 1200     ; Seg. máx. reales por petición (20 min)
; limit_time_real_cron = -1  ; Tiempo máx. para tareas cron (-1 = sin límite)

; --- Límite de peticiones ---
; limit_request = 8192       ; Nº de peticiones antes de reciclar worker

; #############################################
; # SMTP - CORREO SALIENTE
; #############################################
; smtp_server = localhost
; smtp_port = 25
; smtp_ssl = False           ; True para STARTTLS (puerto 587) o SSL (puerto 465)
; smtp_ssl_certificate_filename = False  ; Ruta a certificado cliente SSL
; smtp_ssl_private_key_filename = False  ; Ruta a clave privada SSL
; smtp_user = False
; smtp_password = False
; email_from = False         ; Dirección "From" por defecto (ej: noreply@tudominio.com)
; from_filter = False        ; Dominios permitidos para envío (ej: .*@tudominio\.com)

; #############################################
; # LOGGING
; #############################################
log_level = info
; log_handler = :INFO        ; Control granular: modulo:NIVEL (DEBUG,INFO,WARNING,ERROR,CRITICAL)
                             ; Ejemplo: :WARNING,odoo.addons.mi_modulo:DEBUG
; logfile = False            ; Ruta al archivo de log (False = stdout)
; log_db = False             ; Guardar logs en tabla ir_logging de la BD
; log_db_level = warning     ; Nivel mínimo para log_db
; syslog = False             ; Enviar logs a syslog del sistema
; logrotate = False          ; Rotar archivos de log automáticamente

; #############################################
; # DATOS Y FILESTORE
; #############################################
data_dir = /var/lib/odoo
csv_internal_sep = ,
; unaccent = False           ; Búsquedas ignorando acentos (requiere extensión unaccent en PostgreSQL)

; #############################################
; # IMPORTACIÓN Y EXPORTACIÓN
; #############################################
; import_partial = False     ; Directorio para importaciones parciales (recuperar si falla)
; limit_time_real = 1200     ; También afecta a imports grandes

; #############################################
; # INTERNACIONALIZACIÓN (i18n)
; #############################################
; translate_modules = ['all']  ; Módulos a traducir al exportar traducciones
; language = es_ES             ; Idioma por defecto para nuevas BDs
; load_language = es_ES        ; Cargar idioma al arrancar

; #############################################
; # MODO DESARROLLO
; #############################################
; dev_mode = False           ; Opciones: reload,qweb,xml,all
                             ; reload = recarga Python al cambiar archivos
                             ; qweb  = recarga templates QWeb
                             ; xml   = recarga datos XML sin reiniciar
                             ; all   = todo lo anterior

; #############################################
; # TESTING
; #############################################
; test_enable = False        ; Ejecutar tests al instalar/actualizar módulos
; test_file = False          ; Archivo de test específico a ejecutar
; test_tags = False          ; Tags de tests a ejecutar (ej: :TestAccountMove)
; screencasts = False        ; Directorio para guardar screencasts de tests
; screenshots = False        ; Directorio para guardar screenshots de tests fallidos

; #############################################
; # MULTI-PROCESO Y GEVENT
; #############################################
; gevent_port = 8072         ; Puerto para el servidor gevent (longpolling/websocket)
; transient_age_limit = 1.0  ; Tiempo (horas) para expirar assets transitorios
; osv_memory_count_limit = 0 ; Límite de registros virtuales en memoria (0 = sin límite)
; osv_memory_age_limit = 1.0 ; Horas antes de expirar registros virtuales

; #############################################
; # REPORTES
; #############################################
; reportgz = False           ; Comprimir reportes PDF con gzip

; #############################################
; # SESIONES
; #############################################
; session_redis = False      ; URL de Redis para sesiones distribuidas (ej: redis://localhost:6379)
