[options]
; =============================================
; Configuración de Odoo 19 Community
; =============================================

; --- Conexión a la base de datos ---
db_host = db
db_port = 5432
db_user = odoo
db_password = False  ; Se inyecta via variable de entorno en docker-compose
; db_name = False  ; Descomenta y pon el nombre si quieres forzar una sola BD

; --- Rutas de addons ---
addons_path = /mnt/extra-addons,/opt/odoo/muk-modules,/opt/odoo/oca/web,/opt/odoo/oca/server-tools,/opt/odoo/oca/server-ux,/opt/odoo/oca/reporting-engine,/opt/odoo/oca/partner-contact,/opt/odoo/oca/account-financial-tools,/opt/odoo/oca/queue,/opt/odoo/oca/social,/opt/odoo/oca/stock-logistics-workflow,/opt/odoo/oca/bank-payment,/opt/odoo/oca/server-brand,/usr/lib/python3/dist-packages/odoo/addons

; --- Servidor ---
http_port = 8069
; longpolling_port = 8072  ; Necesario si usas chat/notificaciones en tiempo real
proxy_mode = True

; --- Seguridad ---
admin_passwd = False  ; CAMBIAR en producción - no commitear la contraseña real
; list_db = True  ; Poner a False en producción para ocultar el selector de BD

; --- Logging ---
log_level = info
; logfile = /var/log/odoo/odoo.log

; --- Workers (descomentar para producción) ---
; workers = 4
; max_cron_threads = 2
; limit_memory_hard = 2684354560
; limit_memory_soft = 2147483648
; limit_time_cpu = 600
; limit_time_real = 1200

; --- Datos / Filestore ---
data_dir = /var/lib/odoo
