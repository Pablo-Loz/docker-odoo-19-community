version: "3.8"

services:
  # =========================================
  # PostgreSQL - Base de datos
  # =========================================
  db:
    image: postgres:16
    container_name: docker_postgres_19_community
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      # Datos de la BD mapeados fuera del contenedor
      - ./postgres-data:/var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U odoo" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # =========================================
  # Odoo 19 Community
  # =========================================
  odoo:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: docker_odoo_19_community
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8069:8069"
      - "8072:8072" # Longpolling (websocket/live chat)
    volumes:
      # Filestore de Odoo (adjuntos, sesiones, etc.)
      - ./odoo-data:/var/lib/odoo
      # Carpeta para tus propios addons personalizados
      - ./custom-addons:/mnt/extra-addons
      # Configuración de Odoo (montada para edición en caliente)
      - ./odoo.conf:/etc/odoo/odoo.conf:ro
    environment:
      - HOST=db
      - PORT=5432
      - USER=${POSTGRES_USER}
      - PASSWORD=${POSTGRES_PASSWORD}

volumes:
  postgres-data:
  odoo-data:
